<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════
// TERRAIN - real world dimensions ~35x40m
// Slope: NW high (281m) -> SE low (278m)
// Layout (top-down, NW = top-left):
//
//   STREET (top edge)
//   ─────────────────────────────────────
//   │ 10m DRIVEWAY                      │
//   │                                    │
//   │  [PARKING 6 cars]  [GARAGE][HOUSE] │  ← ~281m
//   │                                    │
//   │  [HEDGE]  [TRAVNJAK 1]             │  ← ~280.5m
//   │           ═══potporni zid═══       │
//   │           [TRAVNJAK 2]  [PLASTENIK]│  ← ~280m
//   │           ═══potporni zid═══       │
//   │           [TRAVNJAK 3]             │  ← ~279.5m
//   │           ═══potporni zid═══       │
//   │     [KONOBA]    [BAZEN]            │  ← ~278.5m
//   │                                    │
//   ─────────────── BETONSKI ZID ────────
//
// ═══════════════════════════════════════════════════════════════

const W = 20, D = 50; // 20m wide x 50m deep (confirmed by user)
const HW = W/2, HD = D/2;

// Elevation: steep terraced slope. Street (z=0) is HIGHEST (~281m), bottom (z=40) is LOWEST (~278m)
// Terraces create visible flat platforms with drops between them
function elev(x, z) {
  const nt = z / D;
  // Base slope
  let h = 4.0 * (1.0 - nt);
  // Terrace steps: flatten within each terrace zone, drop at walls
  if (z < 20) h = 3.8;          // house/parking zone (flat, high)
  else if (z < 21) h = 3.8 - (z-20)*1.0; // wall drop
  else if (z < 29) h = 2.8;     // terrace 1 (flat)
  else if (z < 30) h = 2.8 - (z-29)*0.8; // wall drop
  else if (z < 38) h = 2.0;     // terrace 2 (flat)
  else if (z < 39) h = 2.0 - (z-38)*0.6; // wall drop
  else h = 1.4;                  // lowest zone (pool/konoba/workout)
  // Gentle undulation
  h += Math.sin(x*0.5)*0.04 + Math.cos(z*0.3)*0.03;
  return Math.max(0, h);
}

// ═══════════════════════════════════════════════════════════════
// THREE.JS
// ═══════════════════════════════════════════════════════════════
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 500);
const ren = new THREE.WebGLRenderer({antialias:true});
ren.setSize(innerWidth, innerHeight);
ren.setPixelRatio(Math.min(devicePixelRatio, 2));
ren.shadowMap.enabled = true;
ren.shadowMap.type = THREE.PCFSoftShadowMap;
ren.toneMapping = THREE.ACESFilmicToneMapping;
ren.toneMappingExposure = 1.1;
document.body.appendChild(ren.domElement);

const ctrl = new OrbitControls(cam, ren.domElement);
ctrl.enableDamping = true;
ctrl.dampingFactor = 0.08;
ctrl.maxPolarAngle = Math.PI/2.05;
ctrl.minDistance = 2;
ctrl.maxDistance = 150;
ctrl.zoomSpeed = 1.2;         // brže zumiranje
ctrl.rotateSpeed = 0.6;       // glađa rotacija

// Sky
const skyG = new THREE.SphereGeometry(200,32,32);
const skyM = new THREE.ShaderMaterial({side:THREE.BackSide,
  vertexShader:`varying vec3 vP;void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
  fragmentShader:`varying vec3 vP;void main(){
    float t=normalize(vP).y;
    vec3 sky=vec3(.4,.65,1.),hor=vec3(.78,.88,1.),gnd=vec3(.5,.6,.4);
    vec3 c=t>0.?mix(hor,sky,pow(t,.45)):mix(hor,gnd,pow(-t,.3));
    float cl=smoothstep(.12,.3,t)*(1.-smoothstep(.3,.65,t));
    c=mix(c,vec3(1.),cl*.35);
    gl_FragColor=vec4(c,1.);}`
});
scene.add(new THREE.Mesh(skyG,skyM));

// Lighting
scene.add(new THREE.AmbientLight(0xc0d4e8, 0.5));
const sun = new THREE.DirectionalLight(0xfff5e0, 1.3);
sun.position.set(20,25,-15);
sun.castShadow = true;
sun.shadow.camera.left=-25; sun.shadow.camera.right=25;
sun.shadow.camera.top=25; sun.shadow.camera.bottom=-25;
sun.shadow.mapSize.set(2048,2048);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x556b2f, 0.35));

// ═══════════════════════════════════════════════════════════════
// UPDATED LAYOUT (from floor plan + user feedback)
//
// z=0   CESTA (ulica)
// z=2   granica parcele
// z=2-10  ASFALTIRANI PRILAZ (driveway) + 6 PARKING mjesta
// z=10-12 ASFALTIRANI BLOK oko kuće
// z=10-18 KUĆA (L-oblik, garaža prema cesti z=10)
// z=18   kraj asfaltnog bloka
// z=19   ═══ potporni zid 1 ═══
// z=19-25 TRAVNJAK 1
// z=25   ═══ potporni zid 2 ═══
// z=25-31 TRAVNJAK 2 + PLASTENIK
// z=31   ═══ potporni zid 3 ═══
// z=31-38 BAZEN + KONOBA
// z=39   BETONSKI ZID (granica)
//
// x=2  živa ograda (917/3)
// x=33 betonski zid + penjačice
// ═══════════════════════════════════════════════════════════════
// TERRAIN MESH (with visible terracing)
const tRes = 120;
const tGeo = new THREE.PlaneGeometry(W, D, tRes, tRes);
tGeo.rotateX(-Math.PI/2);
const tv = tGeo.attributes.position;
const tColors = new Float32Array(tv.count * 3);

for (let i = 0; i < tv.count; i++) {
  const x = tv.getX(i) + HW;
  const z = tv.getZ(i) + HD;
  const y = elev(x, z);
  tv.setY(i, y);
  const n = Math.sin(x*4)*0.02 + Math.cos(z*5)*0.015;
  const t = y / 4.0;
  tColors[i*3]   = 0.20 + t*0.15 + n;
  tColors[i*3+1] = 0.48 + t*0.18 + n;
  tColors[i*3+2] = 0.10 + n;
}
tGeo.setAttribute('color', new THREE.BufferAttribute(tColors, 3));
tGeo.computeVertexNormals();
const terrain = new THREE.Mesh(tGeo, new THREE.MeshLambertMaterial({vertexColors:true}));
terrain.receiveShadow = true;
scene.add(terrain);

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function wp(x,z) { return new THREE.Vector3(x-HW, elev(x,z), z-HD); }
function wpY(x,z,yOverride) { return new THREE.Vector3(x-HW, yOverride, z-HD); }

function box(x,z,w,h,d,col,ry) {
  const g = new THREE.BoxGeometry(w,h,d);
  const m = new THREE.Mesh(g, new THREE.MeshLambertMaterial({color:col}));
  const p = wp(x,z);
  m.position.set(p.x, p.y+h/2, p.z);
  if(ry) m.rotation.y = ry;
  m.castShadow=true; m.receiveShadow=true;
  scene.add(m); return m;
}

function flat(x,z,w,d,col) {
  const g = new THREE.PlaneGeometry(w,d); g.rotateX(-Math.PI/2);
  const m = new THREE.Mesh(g, new THREE.MeshLambertMaterial({color:col}));
  const p = wp(x,z);
  m.position.set(p.x, p.y+0.03, p.z);
  m.receiveShadow=true; scene.add(m); return m;
}

function tree(x,z,h,r,col) {
  const p = wp(x,z);
  // Trunk
  const tk = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.15,h*0.45,8),
    new THREE.MeshLambertMaterial({color:0x7a5a2a}));
  tk.position.set(p.x, p.y+h*0.22, p.z);
  tk.castShadow=true; scene.add(tk);
  // Crown
  const cr = new THREE.Mesh(new THREE.SphereGeometry(r,10,8),
    new THREE.MeshLambertMaterial({color:col||0x2d8a2d}));
  cr.position.set(p.x, p.y+h*0.6, p.z);
  cr.castShadow=true; scene.add(cr);
}

function conifer(x,z,h) {
  const p = wp(x,z);
  const tk = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.08,h*0.25,6),
    new THREE.MeshLambertMaterial({color:0x5a3a1a}));
  tk.position.set(p.x, p.y+h*0.12, p.z);
  scene.add(tk);
  const cn = new THREE.Mesh(new THREE.ConeGeometry(0.6,h*0.85,8),
    new THREE.MeshLambertMaterial({color:0x1a5c1a}));
  cn.position.set(p.x, p.y+h*0.5, p.z);
  cn.castShadow=true; scene.add(cn);
}

function label(text, x, z, yOff) {
  const c = document.createElement('canvas');
  c.width=1024; c.height=256;
  const ctx = c.getContext('2d');
  ctx.fillStyle='rgba(255,255,255,0.92)';
  ctx.beginPath(); ctx.roundRect(12,12,1000,232,20); ctx.fill();
  ctx.shadowColor='rgba(0,0,0,0.15)'; ctx.shadowBlur=10;
  ctx.strokeStyle='#2d5016'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.roundRect(12,12,1000,232,20); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='#1a3a0a'; ctx.font='bold 80px system-ui';
  ctx.textAlign='center'; ctx.fillText(text,512,155);
  const tex = new THREE.CanvasTexture(c);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true}));
  const p = wp(x,z);
  sp.position.set(p.x, p.y+(yOff||3.5), p.z);
  sp.scale.set(5,1.25,1);
  sp.userData = {text: text};
  scene.add(sp); return sp;
}

// ═══════════════════════════════════════════════════════════════
// LAYOUT - North=top (z=0, street), South=bottom (z=40, low)
//
//  z=0   CESTA (ulica)
//  z=3   ---- granica parcele ----
//  z=5   ASFALTIRANI PRILAZ
//  z=8   [6x PARKING]     [GARAŽA] [KUĆA]
//  z=13  ---- potporni zid 1 ----
//  z=13-19  TRAVNJAK 1
//  z=19  ---- potporni zid 2 ----
//  z=19-25  TRAVNJAK 2     [PLASTENIK]
//  z=25  ---- potporni zid 3 ----
//  z=25-31  TRAVNJAK 3
//  z=31  ---- potporni zid 4 ----
//  z=32-38  [KONOBA]  [BAZEN]
//  z=38  ---- betonski zid (granica) ----
//
//  x: 0=west(hedge917/3), 35=east
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// OBJECTS - All positioned based on floor plan + user feedback
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// LAYOUT: 20m wide × 50m deep
// z=0 CESTA | z=2-12 PRILAZ (valovit) | z=12-19 KUĆA+GARAŽA+PARKING
// Garaža otvara se BOČNO (prema x=20)
// Parking ISPRED garaže (desna strana)
// Bašta na LIJEVOJ strani kuće
// z=21 PZ1 | z=21-30 TRAVNJAK1 | z=30 PZ2 | z=30-38 TRAVNJAK2
// z=38 PZ3 | z=38-48 BAZEN+KONOBA+WORKOUT+KOKOŠINJAC
// ═══════════════════════════════════════════════════════════════

// --- STREET ---
flat(HW, 0.5, W+15, 2, 0x333333);
box(HW, 1.5, W+10, 0.15, 0.3, 0xbbbbbb);

// --- CURVED DRIVEWAY (valovit prilaz od ceste do garaže, ~10m) ---
const asphaltMat = new THREE.MeshLambertMaterial({color:0x3a3a3a});
// Curved driveway segments (starts at street x=10, curves toward garage at x=16, z=14)
const dPts=[[10,2],[10,4],[11,6],[12,8],[13,10],[14,12],[15.5,14]];
for(let i=0;i<dPts.length-1;i++){
  const[x1,z1]=dPts[i],[x2,z2]=dPts[i+1];
  const len=Math.hypot(x2-x1,z2-z1),ang=Math.atan2(z2-z1,x2-x1);
  const mx=(x1+x2)/2,mz=(z1+z2)/2,mp=wp(mx,mz);
  const g=new THREE.BoxGeometry(len+0.3,0.08,3.5);
  const m=new THREE.Mesh(g,asphaltMat);
  m.position.set(mp.x,mp.y+0.05,mp.z);m.rotation.y=-ang;m.receiveShadow=true;scene.add(m);
}

// --- ASPHALT PAD (parking bliže cesti + prilaz do garaže) ---
{const g=new THREE.PlaneGeometry(8,12);g.rotateX(-Math.PI/2);
const m=new THREE.Mesh(g,asphaltMat);
const p=wp(15,8);m.position.set(p.x,p.y+0.06,p.z);m.receiveShadow=true;scene.add(m);}

// --- PARKING (6 cars, bliže cesti, ispred garaže) ---
const carCol=[0x1a1a8a,0xcc2222,0xdddddd,0x222222,0x1a6a2a,0x8a5a1a];
for(let r=0;r<2;r++) for(let c=0;c<3;c++){
  const cx2=13+c*2.3, cz2=4+r*4;
  const cp=wp(cx2,cz2);
  const body=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.55,3.5),
    new THREE.MeshLambertMaterial({color:carCol[r*3+c]}));
  body.position.set(cp.x,cp.y+0.4,cp.z); body.castShadow=true; scene.add(body);
  const roof=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.35,1.8),
    new THREE.MeshLambertMaterial({color:carCol[r*3+c]}));
  roof.position.set(cp.x,cp.y+0.85,cp.z-0.1); roof.castShadow=true; scene.add(roof);
}

// --- HOUSE (L-shaped) ---
// Kuća primaknuta lijevo: 3.6m od lijeve granice, 4m od desne
// Lijevi rub kuće: x=3.6, desni rub garaže: x=16
const hx=8.1, hz=15; // center of main house (3.6 + 9/2)
const hp = wp(hx, hz);

// Main section ~9x6m (living, kitchen, dining)
box(8.1, 15, 9, 3.5, 6, 0xf5f0e6);
// Extension ~6x3.5m (bedrooms, bathroom)
box(8.1, 19, 6, 3.5, 3.5, 0xf5f0e6);

// Roofs
const roof1=new THREE.Mesh(new THREE.ConeGeometry(6.5,2,4),new THREE.MeshLambertMaterial({color:0xb35c44}));
roof1.position.set(8.1-HW,hp.y+4.5,15-HD);roof1.rotation.y=Math.PI/4;roof1.castShadow=true;scene.add(roof1);
const roof2=new THREE.Mesh(new THREE.ConeGeometry(4.5,1.5,4),new THREE.MeshLambertMaterial({color:0xb35c44}));
roof2.position.set(8.1-HW,hp.y+4.3,19-HD);roof2.rotation.y=Math.PI/4;roof2.castShadow=true;scene.add(roof2);

// GARAGE (attached to house, door opens FORWARD toward street/z=0)
// Garage 6.4m x 3.6m from floor plan
box(12.5, 12.5, 6.4, 2.8, 3.6, 0xe8e0d0);
// Garage door (opens FORWARD toward street = -z face)
{const gdp=wp(12.5,10.7);
const gd=new THREE.Mesh(new THREE.BoxGeometry(4,2.2,0.08),
  new THREE.MeshLambertMaterial({color:0x777777}));
gd.position.set(gdp.x,gdp.y+1.2,gdp.z);scene.add(gd);}
{const roof3=new THREE.Mesh(new THREE.BoxGeometry(7,0.15,4.2),
  new THREE.MeshLambertMaterial({color:0xa04c34}));
roof3.position.set(12.5-HW,hp.y+3.0,12.5-HD);scene.add(roof3);}
// Dimension labels on house
// (labels added below)

// Windows (front face, -z side)
const winM=new THREE.MeshLambertMaterial({color:0x87ceeb,emissive:0x335577,emissiveIntensity:0.2});
for(let i=-2;i<=1;i++){const w=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.9,0.06),winM);
w.position.set(8.1+i*1.5-HW,hp.y+2.2,12.0-HD);scene.add(w);}
{const dr=new THREE.Mesh(new THREE.BoxGeometry(0.9,2.1,0.06),
new THREE.MeshLambertMaterial({color:0x6B4226}));
dr.position.set(8.1-HW,hp.y+1.1,12.0-HD);scene.add(dr);}
for(let i=-1;i<=1;i+=2){const w=new THREE.Mesh(new THREE.BoxGeometry(0.7,0.9,0.06),winM);
w.position.set(8.1+i*1.2-HW,hp.y+2.2,20.8-HD);scene.add(w);}
// Terrace in front
flat(7, 11.5, 8, 1.5, 0xd4c4a8);

// --- RETAINING WALLS (kameni potporni zidovi) ---
function retWall(z, xFrom, xTo, h) {
  const len = xTo-xFrom, midX = (xFrom+xTo)/2;
  const yTop = elev(midX, z-0.5); // elevation above wall
  const yBot = elev(midX, z+0.5); // elevation below wall
  const wallH = h || (yTop - yBot + 0.3);
  const p = wp(midX, z);
  // Stone wall face
  const wl = new THREE.Mesh(new THREE.BoxGeometry(len, wallH, 0.5),
    new THREE.MeshLambertMaterial({color:0x8a7a64}));
  wl.position.set(p.x, yBot + wallH/2, p.z);
  wl.castShadow=true; wl.receiveShadow=true; scene.add(wl);
  // Cap stones
  const cap = new THREE.Mesh(new THREE.BoxGeometry(len, 0.12, 0.7),
    new THREE.MeshLambertMaterial({color:0xa89878}));
  cap.position.set(p.x, yBot + wallH + 0.06, p.z);
  scene.add(cap);
}

retWall(21, 3, 18, 1.2);
retWall(30, 3, 18, 0.9);
retWall(38, 3, 18, 0.8);

// --- LED RASVJETA ---
function addLED(x, z, baseY) {
  const led = new THREE.Mesh(new THREE.SphereGeometry(0.15,8,6),
    new THREE.MeshBasicMaterial({color:0xffff88}));
  led.position.set(x-HW, baseY, z-HD);
  scene.add(led);
  const glow = new THREE.Mesh(new THREE.SphereGeometry(0.35,8,6),
    new THREE.MeshBasicMaterial({color:0xffffaa,transparent:true,opacity:0.3}));
  glow.position.set(x-HW, baseY, z-HD);
  scene.add(glow);
  const pl = new THREE.PointLight(0xffddaa, 0.4, 5);
  pl.position.set(x-HW, baseY+0.15, z-HD);
  scene.add(pl);
}
// Na potpornim zidovima
for (const wz of [21, 30, 38]) {
  const wallH = wz===21 ? 1.2 : wz===30 ? 0.9 : 0.8;
  const yBase = elev(10, wz+0.5);
  for (let x = 4; x <= 18; x += 4) addLED(x, wz, yBase+wallH+0.15);
}
// Na betonskim zidovima oko parcele
// Desni zid (x=19.5)
for (let z = 6; z < 48; z += 5) addLED(19.5, z, elev(19.5,z)+2.0);
// Stražnji zid (z=48)

// Earth/gravel base + individual rounded stones
const stoneColors = [0x888888,0x999999,0x777777,0xaaaaaa,0x909090,0x858585,0x7a7a7a,0x9a9a9a];
function stonePath(pts, w) {
  for (let i = 0; i < pts.length-1; i++) {
    const [x1,z1] = pts[i], [x2,z2] = pts[i+1];
    const len = Math.hypot(x2-x1,z2-z1);
    const ang = Math.atan2(z2-z1,x2-x1);
    const mx=(x1+x2)/2, mz=(z1+z2)/2;
    const mp = wp(mx, mz);
    // Earth/gravel base (brown)
    const base = new THREE.Mesh(new THREE.BoxGeometry(len+0.2, 0.06, w+0.2),
      new THREE.MeshLambertMaterial({color:0x6b5a45}));
    base.position.set(mp.x, mp.y+0.04, mp.z);
    base.rotation.y = -ang; base.receiveShadow=true; scene.add(base);
    // Individual cobblestones along the path
    const nStones = Math.floor(len / 0.25);
    const perpX = -Math.sin(ang), perpZ = Math.cos(ang);
    for (let s = 0; s < nStones; s++) {
      const t = (s+0.3+Math.random()*0.4)/nStones;
      // 2-3 stones across width
      const across = Math.floor(Math.random()*3) + 2;
      for (let a = 0; a < across; a++) {
        const offset = (a/(across-1) - 0.5) * w * 0.8 + (Math.random()-0.5)*0.1;
        const sx = x1 + t*(x2-x1) + perpX*offset;
        const sz = z1 + t*(z2-z1) + perpZ*offset;
        const sp2 = wp(sx, sz);
        const stoneSize = 0.08 + Math.random()*0.08;
        const stone = new THREE.Mesh(
          new THREE.SphereGeometry(stoneSize, 6, 4),
          new THREE.MeshLambertMaterial({color:stoneColors[Math.floor(Math.random()*stoneColors.length)]})
        );
        stone.position.set(sp2.x, sp2.y+0.06+stoneSize*0.3, sp2.z);
        stone.scale.y = 0.4 + Math.random()*0.2; // flatten stones
        stone.rotation.y = Math.random()*Math.PI;
        scene.add(stone);
      }
    }
    // Edge border stones (bigger, darker)
    for (let side of [-1,1]) {
      const nEdge = Math.floor(len/0.4);
      for (let e = 0; e < nEdge; e++) {
        const t2 = (e+0.5)/nEdge;
        const ex = x1+t2*(x2-x1)+perpX*side*w*0.5;
        const ez = z1+t2*(z2-z1)+perpZ*side*w*0.5;
        const ep = wp(ex,ez);
        const edgeStone = new THREE.Mesh(
          new THREE.SphereGeometry(0.1+Math.random()*0.05,6,4),
          new THREE.MeshLambertMaterial({color:0x666666}));
        edgeStone.position.set(ep.x,ep.y+0.08,ep.z);
        edgeStone.scale.y=0.35;
        scene.add(edgeStone);
      }
    }
  }
}

// --- PANELNA OGRADA (zelena, na vrhu zidova) ---
const fenceGreen = 0x2a6e2a;
const fencePostMat = new THREE.MeshLambertMaterial({color:0x1a5a1a});
const fencePanelMat = new THREE.MeshLambertMaterial({color:fenceGreen, transparent:true, opacity:0.4, side:THREE.DoubleSide});
const fenceWireMat = new THREE.MeshLambertMaterial({color:fenceGreen});

function panelFence(x1,z1,x2,z2,wallTopY) {
  const len=Math.hypot(x2-x1,z2-z1);
  const ang=Math.atan2(z2-z1,x2-x1);
  const mx=(x1+x2)/2, mz=(z1+z2)/2;
  const baseY = wallTopY !== undefined ? wallTopY : elev(mx,mz)+1.8;
  const fenceH = 1.5;
  // Panel (semi-transparent green mesh)
  const panel=new THREE.Mesh(new THREE.PlaneGeometry(len,fenceH),fencePanelMat);
  panel.position.set(mx-HW, baseY+fenceH/2, mz-HD);
  panel.rotation.y=-ang;
  scene.add(panel);
  // Horizontal wires (3 lines)
  for(let h=0.2;h<fenceH;h+=0.5){
    const wire=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,len,4),fenceWireMat);
    wire.position.set(mx-HW, baseY+h, mz-HD);
    wire.rotation.z=Math.PI/2; wire.rotation.y=ang;
    scene.add(wire);
  }
  // Vertical wires
  const nVert=Math.floor(len/0.15);
  for(let i=0;i<nVert;i++){
    const t=(i+0.5)/nVert;
    const vx=x1+t*(x2-x1), vz=z1+t*(z2-z1);
    const vert=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,fenceH,4),fenceWireMat);
    vert.position.set(vx-HW, baseY+fenceH/2, vz-HD);
    scene.add(vert);
  }
  // Posts every 2.5m
  const nPosts=Math.max(2,Math.floor(len/2.5)+1);
  for(let i=0;i<nPosts;i++){
    const t=i/(nPosts-1);
    const px2=x1+t*(x2-x1), pz2=z1+t*(z2-z1);
    // Square post
    const post=new THREE.Mesh(new THREE.BoxGeometry(0.06,fenceH+0.15,0.06),fencePostMat);
    post.position.set(px2-HW, baseY+fenceH/2, pz2-HD);
    post.castShadow=true;
    scene.add(post);
    // Post cap
    const cap2=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.05,0.1),fencePostMat);
    cap2.position.set(px2-HW, baseY+fenceH+0.08, pz2-HD);
    scene.add(cap2);
  }
}

window.sv = function(name, e) {
  const v = views[name]; if(!v) return;
  document.querySelectorAll('#vb button').forEach(b=>b.classList.remove('a'));
  if(e && e.target) e.target.classList.add('a');
  const s0=cam.position.clone(), s1=ctrl.target.clone();
  const e0=new THREE.Vector3(...v.pos), e1=new THREE.Vector3(...v.tgt);
  const t0=Date.now();
  (function anim(){
    const t=Math.min(1,(Date.now()-t0)/1200);
    const e=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    cam.position.lerpVectors(s0,e0,e);
    ctrl.target.lerpVectors(s1,e1,e);
    ctrl.update();
    if(t<1) requestAnimationFrame(anim);
  })();
  const el=document.getElementById('lbl');
  el.textContent=viewLabels[name]||'';
  el.classList.add('s');
  setTimeout(()=>el.classList.remove('s'),2500);
};

}

// HD Screenshot - zooms out to show EVERYTHING, 4x res
window.hiResScreenshot = function() {
  const scale = 4;
  const w = innerWidth * scale;
  const h = innerHeight * scale;

  // Save current camera
  const origPos = cam.position.clone();
  const origTgt = ctrl.target.clone();
  const origFov = cam.fov;

  // Move camera to bird's eye showing entire plot + parking + street
  cam.position.set(25, 40, -25);
  ctrl.target.set(0, 0, 3);
  cam.fov = 55;
  cam.updateProjectionMatrix();
  ctrl.update();

  // Render at high res
  ren.setSize(w, h);
  ren.setPixelRatio(1);
  cam.aspect = w / h;
  cam.updateProjectionMatrix();
  ren.render(scene, cam);

  // Save
  const link = document.createElement('a');
  link.download = 'vrt_galic_HD.png';
  link.href = ren.domElement.toDataURL('image/png');
  link.click();

  // Restore everything
  cam.position.copy(origPos);
  ctrl.target.copy(origTgt);
  cam.fov = origFov;
  ren.setSize(innerWidth, innerHeight);
  ren.setPixelRatio(Math.min(devicePixelRatio, 2));
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  ctrl.update();

  const el = document.getElementById('lbl');
  el.textContent = 'Screenshot spremljen! (4K, cijela parcela)';
  el.classList.add('s');
  setTimeout(() => el.classList.remove('s'), 2500);
};

  '← 3.6m →':'← 3.6m →', '← 4m →':'← 4m →',
};
let isHR = true;
window.toggleLang = function() {
  isHR = !isHR;
  document.getElementById('btnLang').textContent = isHR ? '🌐 English' : '🌐 Hrvatski';
  // Update info panel
  const info = document.getElementById('info');
  if (isHR) {
    info.querySelector('h2').textContent = 'Dvorište obitelji Galić';
    info.querySelectorAll('p')[2].innerHTML = '<kbd>Klik + vuci</kbd> rotacija <kbd>Scroll</kbd> zoom';
  } else {
    info.querySelector('h2').textContent = 'Galić Family Garden';
    info.querySelectorAll('p')[2].innerHTML = '<kbd>Click + drag</kbd> rotate <kbd>Scroll</kbd> zoom';
  }
  // Update 3D labels
  for (const sp of lbls) {
    const c = sp.material.map.source.data;
    const ctx = c.getContext('2d');
    const oldText = sp.userData.text;
    const newText = isHR ? oldText : (translations[oldText] || oldText);
    ctx.clearRect(0,0,1024,256);
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.beginPath();ctx.roundRect(12,12,1000,232,20);ctx.fill();
    ctx.strokeStyle='#2d5016';ctx.lineWidth=4;
    ctx.beginPath();ctx.roundRect(12,12,1000,232,20);ctx.stroke();
    ctx.fillStyle='#1a3a0a';ctx.font='bold 80px system-ui';
    ctx.textAlign='center';ctx.fillText(newText,512,155);
    sp.material.map.needsUpdate = true;
  }
  const el = document.getElementById('lbl');
  el.textContent = isHR ? 'Jezik: Hrvatski' : 'Language: English';
  el.classList.add('s');
  setTimeout(()=>el.classList.remove('s'), 1500);
};
